<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track daily habits, streaks, and weekly progress.">
  <title>Habit Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2314161a'/><path d='M8 17l5 5 11-11' stroke='%233d9a6f' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0d0f;
      --surface: #16181c;
      --surface-hover: #1e2127;
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(255, 255, 255, 0.18);
      --text: #f0f2f5;
      --text-muted: #b4bcc8;
      --text-faint: #919aa8;
      --accent: #52c48a;
      --accent-dim: rgba(82, 196, 138, 0.18);
      --accent-glow: rgba(82, 196, 138, 0.4);
      --danger: #e87878;
      --danger-dim: rgba(232, 120, 120, 0.14);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 24px rgba(0, 0, 0, 0.28);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --transition: 180ms cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 0.9375rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      z-index: 100;
      padding: 0.5rem 0.875rem;
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 500;
      transition: top var(--transition);
    }

    .skip-link:focus {
      top: 1rem;
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(100% - 2rem, 42rem);
      margin: 0 auto;
      padding: 1.75rem 0 3rem;
    }

    /* Header */
    .dashboard-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .dashboard-header h1 {
      margin: 0;
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      text-wrap: balance;
    }

    .today-label {
      font-family: var(--mono);
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-faint);
      white-space: nowrap;
    }

    /* Stats strip */
    .stats-strip {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 0.75rem 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .stats-primary {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-faint);
    }

    .stats-primary strong {
      font-family: var(--mono);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .progress-track {
      grid-column: 1 / -1;
      height: 3px;
      background: var(--surface);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 320ms cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* Command bar form */
    #add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    #name-input {
      flex: 1;
      min-width: 0;
      padding: 0.5625rem 0.875rem;
      font: inherit;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #name-input::placeholder {
      color: var(--text-faint);
      opacity: 1;
    }

    #name-input:focus {
      outline: none;
      border-color: var(--border-strong);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
    }

    #add-form button[type="submit"] {
      padding: 0.5625rem 1rem;
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--bg);
      background: var(--text);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      white-space: nowrap;
      transition: transform var(--transition), opacity var(--transition), background var(--transition);
    }

    #add-form button[type="submit"]:hover {
      opacity: 0.92;
    }

    #add-form button[type="submit"]:active {
      transform: scale(0.98);
    }

    #add-form button[type="submit"]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Error */
    .error {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--danger);
      margin-bottom: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--danger-dim);
      border-radius: var(--radius-sm);
    }

    /* Habit panel */
    .habit-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .habit-panel-header {
      display: grid;
      grid-template-columns: 2.25rem 1fr 3.5rem 5.5rem 4rem;
      gap: 0.625rem 1rem;
      align-items: center;
      padding: 0.5rem 0.875rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-faint);
      border-bottom: 1px solid var(--border);
    }

    .habit-panel-header span:nth-child(3),
    .habit-panel-header span:nth-child(4) {
      text-align: center;
    }

    .habit-panel-header span:nth-child(5) {
      text-align: right;
    }

    #habit-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #habit-list li {
      display: grid;
      grid-template-columns: 2.25rem 1fr 3.5rem 5.5rem 4rem;
      gap: 0.625rem 1rem;
      align-items: center;
      padding: 0.625rem 0.875rem;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
      animation: row-in 280ms cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    #habit-list li:last-child {
      border-bottom: none;
    }

    #habit-list li:hover {
      background: var(--surface-hover);
    }

    @keyframes row-in {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Custom checkbox */
    #habit-list label {
      display: contents;
      cursor: pointer;
    }

    #habit-list input[type="checkbox"] {
      appearance: none;
      width: 1.125rem;
      height: 1.125rem;
      margin: 0;
      border: 1.5px solid var(--border-strong);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      place-self: center;
    }

    #habit-list input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    #habit-list input[type="checkbox"]:checked::after {
      content: '';
      display: block;
      width: 0.3125rem;
      height: 0.5625rem;
      margin: 0.125rem auto 0;
      border: solid var(--bg);
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    #habit-list input[type="checkbox"]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .habit-name {
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color var(--transition);
    }

    #habit-list li:has(input:checked) .habit-name {
      color: var(--text-faint);
    }

    /* 7-day history */
    .history-dots {
      display: flex;
      gap: 3px;
      justify-content: center;
    }

    .history-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-strong);
      transition: background var(--transition), transform var(--transition);
    }

    .history-dot.done {
      background: var(--accent);
    }

    .history-dot.today {
      box-shadow: 0 0 0 1.5px var(--accent-dim);
    }

    .history-dot.today:not(.done) {
      background: transparent;
      border: 1.5px solid var(--text-faint);
    }

    /* Streak */
    .streak {
      font-family: var(--mono);
      font-size: 0.6875rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--text-faint);
      text-align: center;
      white-space: nowrap;
      justify-self: center;
    }

    .streak.active {
      color: var(--accent);
    }

    /* Delete */
    button.delete {
      justify-self: end;
      padding: 0.25rem 0.5rem 0.25rem 0.625rem;
      font: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-faint);
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: color var(--transition), background var(--transition);
    }

    button.delete:hover {
      color: var(--danger);
      background: var(--danger-dim);
    }

    button.delete:active {
      transform: scale(0.97);
    }

    button.delete:focus-visible {
      outline: 2px solid var(--danger);
      outline-offset: 1px;
    }

    /* Empty state */
    .empty {
      padding: 2.5rem 1.5rem;
      text-align: center;
      color: var(--text-faint);
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .empty-icon {
      display: block;
      width: 2rem;
      height: 2rem;
      margin: 0 auto 0.75rem;
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      opacity: 0.5;
    }

    /* Loading skeleton */
    .skeleton-row {
      display: grid;
      grid-template-columns: 2.25rem 1fr 3.5rem 5.5rem 4rem;
      gap: 0.625rem 1rem;
      align-items: center;
      padding: 0.625rem 0.875rem;
      border-bottom: 1px solid var(--border);
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface-hover) 25%, rgba(255,255,255,0.04) 50%, var(--surface-hover) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
      border-radius: 4px;
    }

    .skeleton-check { width: 1.125rem; height: 1.125rem; }
    .skeleton-name { height: 0.75rem; width: 60%; }
    .skeleton-dots { height: 0.5rem; width: 3.5rem; justify-self: center; }
    .skeleton-streak { height: 0.5rem; width: 2.5rem; justify-self: center; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 520px) {
      .habit-panel-header {
        display: none;
      }

      #habit-list li,
      .skeleton-row {
        grid-template-columns: 2.25rem 1fr auto;
        grid-template-rows: auto auto;
      }

      .history-dots {
        grid-column: 2;
        grid-row: 2;
        justify-content: flex-start;
      }

      .streak {
        grid-column: 3;
        grid-row: 2;
        text-align: right;
      }

      button.delete {
        grid-column: 3;
        grid-row: 1;
      }
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <div class="shell">
    <header class="dashboard-header">
      <h1>Habit Tracker</h1>
      <time id="today-date" class="today-label"></time>
    </header>

    <section class="stats-strip" id="stats-strip" hidden>
      <p class="stats-primary" id="stats-text"></p>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <main id="main">
      <div id="error" class="error" hidden></div>

      <form id="add-form">
        <input type="text" id="name-input" placeholder="New habit..." required autocomplete="off">
        <button type="submit">Add</button>
      </form>

      <section class="habit-panel" aria-label="Today's habits">
        <div class="habit-panel-header" id="panel-header" hidden>
          <span></span>
          <span>Habit</span>
          <span>7 days</span>
          <span>Streak</span>
          <span></span>
        </div>
        <ul id="habit-list" aria-live="polite"></ul>
      </section>
    </main>
  </div>

  <script>
    function todayKey() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatTodayLabel() {
      return new Date().toLocaleDateString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
      });
    }

    const today = todayKey();
    const listEl = document.getElementById('habit-list');
    const formEl = document.getElementById('add-form');
    const nameInput = document.getElementById('name-input');
    const errorEl = document.getElementById('error');
    const statsStrip = document.getElementById('stats-strip');
    const statsText = document.getElementById('stats-text');
    const progressFill = document.getElementById('progress-fill');
    const panelHeader = document.getElementById('panel-header');
    const todayDateEl = document.getElementById('today-date');

    todayDateEl.textContent = formatTodayLabel();
    todayDateEl.dateTime = today;

    function showError(message) {
      errorEl.textContent = message;
      errorEl.hidden = false;
    }

    function clearError() {
      errorEl.hidden = true;
      errorEl.textContent = '';
    }

    function showSkeleton(count = 3) {
      panelHeader.hidden = true;
      statsStrip.hidden = true;
      listEl.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const row = document.createElement('li');
        row.className = 'skeleton-row';
        row.setAttribute('aria-hidden', 'true');
        row.innerHTML = `
          <div class="skeleton skeleton-check"></div>
          <div class="skeleton skeleton-name"></div>
          <div class="skeleton skeleton-dots"></div>
          <div class="skeleton skeleton-streak"></div>
          <div class="skeleton skeleton-streak"></div>
        `;
        listEl.appendChild(row);
      }
    }

    function updateStats(habits) {
      if (habits.length === 0) {
        statsStrip.hidden = true;
        return;
      }

      const done = habits.filter((h) => h.history[today] === true).length;
      const total = habits.length;
      const pct = Math.round((done / total) * 100);

      statsText.innerHTML = `<strong>${done}</strong> of <strong>${total}</strong> done today`;
      progressFill.style.width = `${pct}%`;
      statsStrip.hidden = false;
    }

    function renderHistoryDots(history) {
      const container = document.createElement('div');
      container.className = 'history-dots';
      container.setAttribute('aria-hidden', 'true');

      const dates = Object.keys(history).sort();
      for (const date of dates) {
        const dot = document.createElement('span');
        dot.className = 'history-dot';
        if (history[date]) dot.classList.add('done');
        if (date === today) dot.classList.add('today');
        container.appendChild(dot);
      }

      return container;
    }

    async function fetchHabits() {
      const res = await fetch('/api/habits');
      if (!res.ok) throw new Error('Failed to load habits');
      return res.json();
    }

    function renderHabits(habits) {
      listEl.innerHTML = '';
      updateStats(habits);

      if (habits.length === 0) {
        panelHeader.hidden = true;
        const empty = document.createElement('p');
        empty.className = 'empty';
        empty.innerHTML = '<span class="empty-icon" aria-hidden="true"></span>No habits yet. Add one above.';
        listEl.appendChild(empty);
        return;
      }

      panelHeader.hidden = false;

      habits.forEach((habit, index) => {
        const li = document.createElement('li');
        li.style.animationDelay = `${index * 40}ms`;

        const label = document.createElement('label');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = habit.history[today] === true;
        checkbox.setAttribute('aria-label', `Mark ${habit.name} complete for today`);
        checkbox.addEventListener('change', () => toggleHabit(habit.id, checkbox));

        const nameSpan = document.createElement('span');
        nameSpan.className = 'habit-name';
        nameSpan.textContent = habit.name;

        label.appendChild(checkbox);
        label.appendChild(nameSpan);

        const historyDots = renderHistoryDots(habit.history);

        const streak = document.createElement('span');
        streak.className = 'streak';
        if (habit.currentStreak > 0) {
          streak.classList.add('active');
          streak.textContent = `${habit.currentStreak} day streak`;
        }

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'delete';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteHabit(habit.id));

        li.appendChild(label);
        li.appendChild(historyDots);
        li.appendChild(streak);
        li.appendChild(deleteBtn);
        listEl.appendChild(li);
      });
    }

    async function load({ skeleton = false } = {}) {
      clearError();
      if (skeleton) {
        showSkeleton();
      }
      try {
        const habits = await fetchHabits();
        renderHabits(habits);
      } catch {
        if (skeleton) {
          listEl.innerHTML = '';
          showError('Could not load habits.');
        } else {
          showError('Could not refresh habits.');
        }
      }
    }

    async function toggleHabit(id, checkbox) {
      clearError();
      try {
        const res = await fetch(`/api/habits/${id}/toggle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: today }),
        });
        if (!res.ok) throw new Error('Toggle failed');
        const { completed } = await res.json();
        checkbox.checked = completed;
        await load();
      } catch {
        checkbox.checked = !checkbox.checked;
        showError('Could not toggle habit.');
      }
    }

    async function deleteHabit(id) {
      clearError();
      try {
        const res = await fetch(`/api/habits/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        await load();
      } catch {
        showError('Could not delete habit.');
      }
    }

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const name = nameInput.value.trim();
      if (!name) return;

      try {
        const res = await fetch('/api/habits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        if (!res.ok) throw new Error('Create failed');
        nameInput.value = '';
        await load();
      } catch {
        showError('Could not add habit.');
      }
    });

    load({ skeleton: true });
  </script>
</body>
</html>
